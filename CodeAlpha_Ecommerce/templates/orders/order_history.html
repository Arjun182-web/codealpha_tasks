{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h1>My Orders</h1>

    {% for order in orders %}

    <div class="card shadow-sm p-3 mb-3">

        <h5>
            Order #{{ order.id }}
        </h5>

        <p>
            Date:
            {{ order.created_at }}
        </p>

    </div>

    {% empty %}

    <div class="alert alert-info">
        No orders yet.
    </div>

    {% endfor %}

</div>

{% endblock %}
