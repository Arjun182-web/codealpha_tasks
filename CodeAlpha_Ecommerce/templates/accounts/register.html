{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg border-0">

            <div class="card-body p-5">

                <h2 class="text-center mb-4">
                    Create Account
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        {{ form.username }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        {{ form.email }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        {{ form.password1 }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Confirm Password
                        </label>

                        {{ form.password2 }}

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Create Account

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Already have an account?

                    <a href="/accounts/login/">
                        Login
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
