{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg border-0">

        <div class="card-body">

            <h2 class="mb-4 text-center">
                Create Post
            </h2>

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    class="btn btn-primary w-100">

                    Post

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
