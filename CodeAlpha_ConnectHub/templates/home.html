{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    {% for post in posts %}

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <h5>
                {{ post.user.username }}
            </h5>

            <small class="text-muted">
                {{ post.created_at }}
            </small>

            <hr>

            <p>
                {{ post.content }}
            </p>

            {% if post.image %}
            <img
                src="{{ post.image.url }}"
                class="img-fluid rounded"
            >
            {% endif %}

        </div>

    </div>

    {% empty %}

    <div class="text-center mt-5">

        <h4>No posts yet</h4>

        <p>Create your first post 🚀</p>

    </div>

    {% endfor %}

</div>

{% endblock %}
