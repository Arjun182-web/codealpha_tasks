<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{

    background:#f3f4f6;

    min-height:100vh;

    font-family:'Segoe UI',sans-serif;

}

        .navbar{
            background:#111827 !important;
        }

        .brand{
            font-size:1.5rem;
            font-weight:700;
            color:white !important;
        }

        .auth-card{
    border:none;
    border-radius:25px;
    overflow:hidden;

    background:rgba(255,255,255,0.95);

    backdrop-filter:blur(10px);

    box-shadow:
        0 25px 50px rgba(0,0,0,0.15);
}

        .left-panel{
            background:linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed
            );

            color:white;
            padding:50px 35px;
            height:100%;
        }

        .left-panel h2{
            font-weight:700;
        }

        .form-control{

    border-radius:12px;

    padding:14px;

    border:1px solid #e5e7eb;

    transition:0.3s;
}

.form-control:focus{

    border-color:#7c3aed;

    box-shadow:
        0 0 0 4px rgba(
            124,
            58,
            237,
            0.15
        );
}

        .btn-purple{

    background:linear-gradient(
        135deg,
        #6d28d9,
        #7c3aed
    );

    border:none;

    color:white;

    padding:12px;

    border-radius:12px;

    transition:0.3s;
}

        .btn-purple:hover{

    transform:translateY(-2px);

    box-shadow:
        0 10px 25px rgba(
            109,
            40,
            217,
            0.4
        );

    color:white;
}

        .page-container{
            min-height:85vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card{

    transition:.3s;

}

.card:hover{

    transform:translateY(-4px);

    box-shadow:0 10px 25px rgba(0,0,0,.15);

}
    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a
    href="{% url 'home' %}"
    class="navbar-brand fw-bold text-white text-decoration-none">

    🚀 ConnectHub

</a>

        <div>

            {% if user.is_authenticated %}
                <span class="text-white me-3">
                    Hi, {{ user.username }}
                </span>

                <a href="{% url 'home' %}" class="btn btn-primary me-2">
                    🏠 Home
                </a>

                <a href="{% url 'create_post' %}"
                    class="btn btn-success me-2">
                    Create Post
                </a>
                
                <a href="{% url 'profile' %}"
                    class="btn btn-warning me-2">
                    Profile
                </a>

                <a href="/logout/" class="btn btn-danger">
                    Logout
                </a>

            {% else %}

                <a href="/login/" class="btn btn-success me-2">
                    Login
                </a>

                <a href="/register/" class="btn btn-primary">
                    Register
                </a>

            {% endif %}

        </div>

    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
