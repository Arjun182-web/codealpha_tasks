{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg border-0">

        <div class="card-body p-5">

            <h2 class="mb-4 text-center">
                Edit Profile
            </h2>

            <form
                method="POST"
                enctype="multipart/form-data"
            >

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Bio
                    </label>

                    {{ form.bio }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Profile Picture
                    </label>

                    {{ form.profile_pic }}

                </div>

                <button
                    class="btn btn-primary w-100"
                    type="submit"
                >
                    Save Changes
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
